 <!-- ── ADD EXPENSE TAB ───────────────────────── -->
    <div id="tab-add" class="tab-content">
      <div class="card">
        <h2>Log an Expense</h2>
        <div class="form-grid">

          <div class="form-group">
            <label for="exp-title">Title</label>
            <input type="text" id="exp-title"
              placeholder="e.g. Jollibee lunch"
              autocomplete="off" />
            <div id="ai-category-hint"></div>
          </div>

          <div class="form-group">
            <label for="exp-amount">Amount (PHP)</label>
            <input type="number" id="exp-amount"
                   placeholder="0.00" min="0" step="0.01" />
          </div>

          <div class="form-group">
            <label for="exp-category">Category</label>
            <select id="exp-category">
              <option value="">-- Select category --</option>
              <option value="Food &amp; Dining">Food and Dining</option>
              <option value="Transportation">Transportation</option>
              <option value="Utilities &amp; Bills">Utilities and Bills</option>
              <option value="Shopping">Shopping</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Education">Education</option>
              <option value="Savings">Savings</option>
              <option value="Housing &amp; Rent">Housing and Rent</option>
              <option value="Others">Others</option>
            </select>
          </div>

          <div class="form-group">
            <label for="exp-date">Date</label>
            <input type="date" id="exp-date" />
          </div>

          <div class="form-group">
            <label for="exp-payment">Payment Method</label>
            <select id="exp-payment">
              <option value="cash">Cash</option>
              <option value="card">Card</option>
              <option value="online">Online</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="exp-notes">Notes (optional)</label>
            <input type="text" id="exp-notes"
                   placeholder="Any additional details..." />
          </div>

          <!-- Scan Receipt Button -->
          <div class="form-group">
            <button class="btn btn-primary" id="btn-scan-receipt"
                    style="width:100%;">
              <span aria-hidden="true">📷</span> Scan Receipt
            </button>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" id="btn-add-expense">
              + Add Expense
            </button>
            <button class="btn btn-success" id="btn-sync"
                    title="Upload local expenses to the server">
              Sync to Cloud
            </button>
          </div>

          <!-- Anomaly warning shown when unusual amount detected -->
          <div id="anomaly-warning" style="display:none;"></div>

        </div>
      </div>
    </div>
