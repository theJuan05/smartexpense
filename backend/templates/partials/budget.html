<!-- ── BUDGET TAB ─────────────────────────────── -->
<div id="tab-budget" class="tab-content">

  <!-- Overall budget hero card (injected by JS when Overall Budget exists) -->
  <div id="budget-hero"></div>

  <!-- Budget Summary -->
  <div class="card">
    <h2>Budget Overview</h2>
    <div id="budget-summary-list">
      <div class="spinner">Loading budgets...</div>
    </div>
  </div>

  <!-- Add New Budget Form -->
  <div class="card">
    <h2>Set a Budget</h2>
    <div class="form-grid">

      <div class="form-group">
        <label for="budget-category">Category</label>
        <select id="budget-category">
          <option value="Overall Budget">Overall Budget</option>
          <option value="Food &amp; Dining">Food and Dining</option>
          <option value="Transportation">Transportation</option>
          <option value="Utilities &amp; Bills">Utilities and Bills</option>
          <option value="Shopping">Shopping</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Education">Education</option>
          <option value="Savings">Savings</option>
          <option value="Housing &amp; Rent">Housing and Rent</option>
          <option value="Others">Others</option>
        </select>
      </div>

      <div class="form-group">
        <label for="budget-amount">Limit Amount (PHP)</label>
        <input type="number" id="budget-amount"
               placeholder="e.g. 5000" min="1" step="0.01" />
      </div>

      <div class="form-group">
        <label for="budget-period">Period</label>
        <select id="budget-period">
          <option value="monthly">Monthly</option>
          <option value="weekly">Weekly</option>
          <option value="daily">Daily</option>
        </select>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="btn-add-budget">
          + Set Budget
        </button>
      </div>

    </div>
  </div>

</div><!-- end tab-budget -->
