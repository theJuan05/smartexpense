<!-- ── RECEIPT SCANNER MODAL ─────────────────────────────── -->
<div id="scanner-modal" class="modal-overlay">
  <div class="modal-box">

    <div class="modal-header">
      <h2>📷 Scan Receipt</h2>
      <button id="btn-close-scanner" class="modal-close">✕</button>
    </div>

    <div class="modal-body">

      <!-- File Upload Area -->
      <label class="file-upload-area" for="scanner-file">
        <div style="font-size:2.2rem;margin-bottom:8px;">📁</div>
        <span style="font-weight:600;">Tap to upload or take a photo</span>
        <span style="font-size:0.8rem;color:var(--text-muted);
                     margin-top:4px;display:block;">
          Opens camera on mobile • File picker on desktop
        </span>
        <input type="file" id="scanner-file"
               accept="image/*" capture="environment"
               style="display:none;" />
      </label>

      <!-- Image Preview -->
      <img id="scanner-preview" src="" alt="Receipt preview"
           style="display:none;width:100%;border-radius:10px;
                  margin-top:12px;max-height:260px;object-fit:contain;
                  border:2px solid var(--border);" />

      <!-- Progress Bar -->
      <div id="scanner-progress" style="display:none;margin-top:14px;">
        <div style="background:var(--border);border-radius:20px;
                    height:8px;overflow:hidden;">
          <div id="scanner-progress-bar"
               style="height:100%;width:0%;background:var(--primary);
                      transition:width 0.3s ease;border-radius:20px;"></div>
        </div>
        <p id="scanner-progress-text"
           style="font-size:0.8rem;color:var(--text-muted);
                  margin-top:6px;text-align:center;"></p>
      </div>

      <!-- Read Button -->
      <button class="btn btn-primary" id="btn-scan-process"
              style="width:100%;margin-top:14px;padding:13px;
                     font-size:0.95rem;" disabled>
        🔍 Read Receipt
      </button>

      <!-- Results -->
      <div id="scanner-result" style="margin-top:14px;"></div>

    </div>
  </div>
</div>
<!-- ── END RECEIPT SCANNER MODAL ─────────────────────────── -->
