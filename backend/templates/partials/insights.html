<!-- ── INSIGHTS TAB ───────────────────────────── -->
<div id="tab-insights" class="tab-content">

  <!-- Anomaly Detection -->
  <div class="card">
    <h2>Unusual Spending
      <span id="anomaly-summary" class="label-aside"></span>
    </h2>
    <div id="anomaly-list">
      <div class="spinner">Scanning...</div>
    </div>
  </div>

  <!-- Prediction Card -->
  <div class="card">
    <h2>Spending Prediction</h2>
    <div id="prediction-card">
      <div class="spinner">Loading prediction...</div>
    </div>
  </div>

  <!-- Forecast Chart -->
  <div class="card card-forecast">
    <h2>Monthly Forecast</h2>
    <div class="chart-container" style="height:300px;">
      <canvas id="chart-forecast" role="img" aria-label="Monthly spending forecast chart"></canvas>
    </div>
    <table class="sr-only" aria-label="Monthly forecast data">
      <caption>Predicted spending by month</caption>
      <thead><tr><th scope="col">Month</th><th scope="col">Amount</th></tr></thead>
      <tbody id="chart-forecast-tbody"></tbody>
    </table>
  </div>

</div><!-- end tab-insights -->
