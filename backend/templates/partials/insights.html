<!-- ── INSIGHTS TAB ───────────────────────────── -->
<div id="tab-insights" class="tab-content">

  <!-- Anomaly Detection -->
  <div class="card">
    <h2>Unusual Spending
      <span id="anomaly-summary" class="label-aside"></span>
    </h2>
    <div id="anomaly-list">
      <div class="spinner">Scanning...</div>
    </div>
  </div>

  <!-- Prediction Card -->
  <div class="card">
    <h2>Spending Prediction</h2>
    <div id="prediction-card">
      <div class="spinner">Loading prediction...</div>
    </div>
  </div>

  <!-- Forecast Chart -->
  <div class="card">
    <h2>Monthly Forecast</h2>
    <div class="chart-container" style="height:300px;">
      <canvas id="chart-forecast"></canvas>
    </div>
  </div>

</div><!-- end tab-insights -->
