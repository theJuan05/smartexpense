<!-- ── GOALS TAB ──────────────────────────────────────────── -->
<div id="tab-goals" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-goals" tabindex="0">

  <div class="card" style="max-width:640px;margin:0 auto;">
    <div class="goals-header">
      <h2>Financial Goals</h2>
      <button class="btn btn-primary btn-sm" onclick="showAddGoalModal()">+ Add Goal</button>
    </div>
    <div id="goals-list">
      <div class="spinner">Loading goals...</div>
    </div>
  </div>

  <!-- Add Goal Modal -->
  <div id="modal-add-goal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-add-goal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-add-goal-title">New Goal</h2>
        <button class="modal-close" onclick="closeAddGoalModal()" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="goal-name-input">Goal name</label>
          <input id="goal-name-input" type="text" placeholder="e.g. Emergency fund" />
        </div>
        <div class="form-group">
          <label for="goal-target-input">Target amount (₱)</label>
          <input id="goal-target-input" type="number" min="1" step="1" placeholder="e.g. 10000" inputmode="numeric" />
        </div>
        <div class="form-group">
          <label for="goal-deadline-input">Deadline <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
          <input id="goal-deadline-input" type="date" />
        </div>
        <div class="form-group">
          <label>Icon</label>
          <div class="goal-icon-picker">
            <button class="goal-icon-btn selected" data-icon="🎯" type="button" title="Goal"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></button>
            <button class="goal-icon-btn" data-icon="🏠" type="button" title="Home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
            <button class="goal-icon-btn" data-icon="📱" type="button" title="Phone / Tech"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></svg></button>
            <button class="goal-icon-btn" data-icon="✈️" type="button" title="Travel"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21 4 19 4c-1 0-2 1-3.5 2.5L11 8 2.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L6 11l-2 3H3l-1 1 3 2 2 3 1-1v-1l3-2 3.5 4.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></button>
            <button class="goal-icon-btn" data-icon="🎓" type="button" title="Education"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></button>
            <button class="goal-icon-btn" data-icon="💻" type="button" title="Laptop / Computer"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8m-4-4v4"/></svg></button>
            <button class="goal-icon-btn" data-icon="🚗" type="button" title="Vehicle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-3"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg></button>
            <button class="goal-icon-btn" data-icon="💰" type="button" title="Savings / Emergency"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg></button>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeAddGoalModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveNewGoal()">Create Goal</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Fund Goal Modal -->
  <div id="modal-fund-goal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="fund-goal-title">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="fund-goal-title">Fund Goal</h2>
        <button class="modal-close" onclick="closeFundGoalModal()" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <p id="fund-remaining" style="color:var(--text-muted);margin-bottom:16px;font-size:0.85rem;"></p>
        <div class="form-group">
          <label for="fund-amount-input">Amount to add (₱)</label>
          <input id="fund-amount-input" type="number" min="1" step="1" placeholder="e.g. 500" inputmode="numeric" />
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeFundGoalModal()">Cancel</button>
          <button class="btn btn-primary" onclick="confirmFund()">Add Funds</button>
        </div>
      </div>
    </div>
  </div>

</div>
