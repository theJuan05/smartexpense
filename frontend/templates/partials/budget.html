<!-- BUDGET TAB -->
<div id="tab-budget" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-budget" tabindex="0">

  <!-- Left column: hero + overview -->
  <div class="budget-left-col">
    <!-- Overall budget hero card (injected by JS) -->
    <div id="budget-hero"></div>

    <!-- Budget Summary -->
    <div class="card">
      <h2>Budget Overview</h2>
      <div id="budget-summary-list">
        <div class="spinner">Loading budgets...</div>
      </div>
    </div>
  </div>

  <!-- Right column: set budget form -->
  <div class="budget-right-col">
    <div class="card">
      <h2>Set a Budget</h2>

      <div class="form-group" style="margin-bottom:14px;">
        <label for="budget-category">Category</label>
        <select id="budget-category">
          <option value="Overall Budget">Overall Budget</option>
          <option value="Food &amp; Dining">Food &amp; Dining</option>
          <option value="Transportation">Transportation</option>
          <option value="Utilities &amp; Bills">Utilities &amp; Bills</option>
          <option value="Shopping">Shopping</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Education">Education</option>
          <option value="Savings">Savings</option>
          <option value="Housing &amp; Rent">Housing &amp; Rent</option>
          <option value="Others">Others</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label for="budget-amount">Limit Amount (PHP)</label>
        <input type="number" id="budget-amount"
               placeholder="e.g. 5000" min="1" step="0.01" />
        <div id="budget-alloc-hint" style="display:none"></div>
      </div>

      <div class="form-group" style="margin-bottom:18px;">
        <label for="budget-period">Period</label>
        <select id="budget-period">
          <option value="monthly">Monthly</option>
          <option value="weekly">Weekly</option>
          <option value="daily">Daily</option>
        </select>
      </div>

      <button class="btn btn-primary" id="btn-add-budget" style="width:100%;">
        + Set Budget
      </button>
    </div>
  </div>

</div><!-- end tab-budget -->
