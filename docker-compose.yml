version: '3.9'

services:

  # ── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: smartexpense_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${DB_NAME:-smartexpense}
      MYSQL_USER:          ${DB_USER:-smartexpense_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-smartexpense_pass}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-smartexpense_user}", "-p${DB_PASSWORD:-smartexpense_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartexpense_app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - external
    expose:
      - "5000"

  # ── Prometheus (metrics collector) ───────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: smartexpense_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - internal
      - external
    ports:
      - "9090:9090"
    depends_on:
      - app

  # ── Grafana (monitoring dashboard) ────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: smartexpense_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-smartexpense123}
      GF_SERVER_DOMAIN:           ${GRAFANA_DOMAIN:-localhost}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal
      - external
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ── Nginx Reverse Proxy / API Gateway ─────────────────────
  nginx:
    image: nginx:alpine
    container_name: smartexpense_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - external

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  db_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
